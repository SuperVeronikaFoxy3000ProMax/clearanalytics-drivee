services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clearanalytics-app
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-drivee}
      RO_USER: ${RO_USER:-analyst_ro}
      RO_PASSWORD: ${RO_PASSWORD:-}
      ADMIN_USER: ${ADMIN_USER:-root}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen/qwen3-coder-30b}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clearanalytics-bot
    command: python telegram_bot.py
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-drivee}
      RO_USER: ${RO_USER:-analyst_ro}
      RO_PASSWORD: ${RO_PASSWORD:-}
      ADMIN_USER: ${ADMIN_USER:-root}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen/qwen3-coder-30b}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
